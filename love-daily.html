<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的甜心日常 | Wolker Lab</title>
  <meta name="description" content="一个需要密码解锁的私密甜心相册。">
  <meta name="keywords" content="我的甜心日常, 私密相册, 密码解锁, Wolker Lab">
  <meta name="author" content="Wolker Lab">
  <meta name="robots" content="noindex,nofollow">
  <link rel="canonical" href="https://wolkerzheng.github.io/love-daily.html">
  <meta property="og:type" content="website">
  <meta property="og:title" content="我的甜心日常 | Wolker Lab">
  <meta property="og:description" content="一个需要密码解锁的私密甜心相册。">
  <meta property="og:url" content="https://wolkerzheng.github.io/love-daily.html">
  <meta property="og:site_name" content="Wolker Lab">
  <meta property="og:image" content="https://wolkerzheng.github.io/assets/og-cover.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="我的甜心日常 | Wolker Lab">
  <meta name="twitter:description" content="一个需要密码解锁的私密甜心相册。">
  <meta name="twitter:image" content="https://wolkerzheng.github.io/assets/og-cover.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/site.css">
  <link rel="stylesheet" href="styles/love-daily.css">
</head>
<body class="love-body love-is-locked">
  <div class="love-background">
    <span class="love-glow love-glow-a"></span>
    <span class="love-glow love-glow-b"></span>
    <span class="love-grid"></span>
  </div>

  <div class="page-shell love-shell">
    <header class="topbar love-topbar">
      <a class="brand" href="index.html">
        <span class="brand-mark"></span>
        <span class="brand-text">
          <strong>Wolker Lab</strong>
          <small>Private Sweetheart Gallery</small>
        </span>
      </a>
      <nav class="topnav">
        <a href="index.html">回到首页</a>
      </nav>
    </header>

    <main class="love-main">
      <section class="love-hero">
        <div class="love-intro">
          <p class="eyebrow">Private Access</p>
          <h1>我的甜心日常</h1>
          <p class="love-lead">输入密码后查看合照轮播、土味情话和冷笑话。</p>
        </div>

        <aside class="love-gate-card" data-love-gate>
          <span class="signal-label">Locked Gallery</span>
          <h2>输入密码查看</h2>
          <form class="love-pass-form" data-love-form>
            <label class="love-pass-label" for="love-password">访问密码</label>
            <input
              id="love-password"
              class="love-pass-input"
              type="password"
              name="password"
              autocomplete="current-password"
              placeholder="请输入密码"
              data-love-password
            >
            <button class="button button-primary love-pass-button" type="submit" data-love-submit>解锁相册</button>
          </form>
          <p class="love-gate-message" data-love-message>内容会在浏览器里解密后显示。</p>
        </aside>
      </section>

      <section class="love-protected" data-love-protected hidden>
        <section class="love-gallery-section" id="gallery">
          <div class="love-column" id="sweet-talks">
            <article class="love-note love-note-sweet love-note-large">
              <span class="love-note-label">土味情话</span>
              <h2 data-love-sweet-main></h2>
            </article>
            <article class="love-note love-note-sweet">
              <span class="love-note-label">再甜一点</span>
              <p data-love-sweet-side-a></p>
            </article>
            <article class="love-note love-note-sweet">
              <span class="love-note-label">继续加糖</span>
              <p data-love-sweet-side-b></p>
            </article>
          </div>

          <div class="love-stage-wrap">
            <article class="love-stage-card">
              <div class="love-stage-head">
                <div>
                  <span class="signal-label">Heart Gallery</span>
                  <strong data-love-counter>正在解锁相册...</strong>
                </div>
                <span class="love-live-pill">LIVE</span>
              </div>

              <div class="love-stage" data-love-stage>
                <span class="love-stage-scan"></span>
                <img class="love-stage-image" data-love-image alt="已加密的甜心相册">
                <div class="love-loading" data-love-loading>图片解密中...</div>

                <div class="love-stage-meta">
                  <div>
                    <span>Current Frame</span>
                    <strong data-love-frame-label>-- / --</strong>
                  </div>
                  <div>
                    <span>Now Playing</span>
                    <strong data-love-caption>等待解锁</strong>
                  </div>
                </div>

                <div class="love-orbit love-orbit-a" data-love-chip="0"></div>
                <div class="love-orbit love-orbit-b" data-love-chip="1"></div>
                <div class="love-orbit love-orbit-c" data-love-chip="2"></div>
                <div class="love-orbit love-orbit-d" data-love-chip="3"></div>
              </div>

              <div class="love-controls">
                <button class="love-control-button" type="button" data-love-prev>上一张</button>
                <div class="love-progress" data-love-progress></div>
                <button class="love-control-button" type="button" data-love-next>下一张</button>
              </div>
            </article>
          </div>

          <div class="love-column" id="cold-jokes">
            <article class="love-note love-note-joke love-note-large">
              <span class="love-note-label">冷笑话</span>
              <h2 data-love-joke-main></h2>
            </article>
            <article class="love-note love-note-joke">
              <span class="love-note-label">冷空气一号</span>
              <p data-love-joke-side-a></p>
            </article>
            <article class="love-note love-note-joke">
              <span class="love-note-label">冷空气二号</span>
              <p data-love-joke-side-b></p>
            </article>
          </div>
        </section>
      </section>
    </main>
  </div>

  <script src="data/site-config.js"></script>
  <script src="scripts/site.js"></script>
  <script src="scripts/love-daily.js"></script>
</body>
</html>
